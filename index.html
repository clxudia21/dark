<title>DARK</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #000; min-height: 100vh;
    display: flex; justify-content: center; align-items: center;
    font-family: 'Courier New', 'Courier', monospace; overflow: hidden;
}
pre {
    color: #880000; font-size: 11px; line-height: 1.05;
    user-select: none; position: relative;
}
.char {
    display: inline-block; white-space: pre;
    transition: none;
}
#flash-layer {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 10; background: white;
}
</style>
</head>

<div id="flash-layer"></div>

    ];

    var pre = document.getElementById('ascii');
    var allChars = [];
    var charRows = [];

    art.forEach(function(line) {
        var row = [];
        for (var i = 0; i < line.length; i++) {
            var span = document.createElement('span');
            span.className = 'char';
            span.textContent = line[i];
            span.dataset.orig = line[i];
            pre.appendChild(span);
            allChars.push(span);
            row.push(span);
        }
        charRows.push(row);
        pre.appendChild(document.createTextNode('\n'));
    });

    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function ri(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    var flashEl = document.getElementById('flash-layer');
    function flashbang() {
        anime.animate(flashEl, { opacity: [0, Math.random() * 0.08, 0], duration: ri(10, 50), ease: 'linear', loop: false });
        setTimeout(flashbang, ri(2000, 6000));
    }
    setTimeout(flashbang, 3000);

    function corruptLine() {
        var row = pick(charRows);
        if (!row) return;
        var len = ri(2, 10);
        var start = ri(0, Math.max(0, row.length - len));
        for (var i = start; i < start + len && i < row.length; i++) {
            if (row[i]) row[i].style.opacity = '0';
        }
        setTimeout(function() {
            for (var i = start; i < start + len && i < row.length; i++) {
                if (row[i]) row[i].style.opacity = '1';
            }
        }, ri(40, 150));
        setTimeout(corruptLine, ri(100, 600));
    }
    corruptLine();

    function jitter() {
        var n = ri(3, 12);
        for (var i = 0; i < n; i++) {
            var idx = ri(0, allChars.length - 1);
            var c = allChars[idx];
            if (!c) continue;
            var dx = ri(-3, 3);
            var dy = ri(-2, 2);
            c.style.transform = 'translate(' + dx + 'px,' + dy + 'px)';
            setTimeout(function(el) { if (el) el.style.transform = ''; }, ri(20, 80), c);
        }
        setTimeout(jitter, ri(40, 200));
    }
    jitter();

    function waveShift() {
        var rowIdx = ri(0, charRows.length - 1);
        var row = charRows[rowIdx];
        if (!row) return;
        var dir = Math.random() > 0.5 ? 1 : -1;
        var len = ri(5, 30);
        var start = ri(0, Math.max(0, row.length - len));
        for (var i = start; i < start + len && i < row.length; i++) {
            if (row[i]) row[i].style.transform = 'translateX(' + (dir * ri(1, 5)) + 'px)';
        }
        setTimeout(function() {
            for (var i = start; i < start + len && i < row.length; i++) {
                if (row[i]) row[i].style.transform = '';
            }
        }, ri(40, 120));
        setTimeout(waveShift, ri(50, 300));
    }
    waveShift();

    function breathe() {
        var scale = 1 + (Math.random() * 0.006);
        anime.animate(pre, {
            scale: scale,
            duration: ri(1500, 3000),
            ease: 'easeInOutSine',
            direction: 'alternate',
            loop: false
        });
        setTimeout(breathe, ri(1500, 3000));
    }
    breathe();

    var glitchRows = charRows.slice(8, 35);
    function eyeGlitch() {
        var row = pick(glitchRows);
        if (!row) return;
        var center = Math.floor(row.length / 2);
        var range = ri(3, 25);
        var start = center - range;
        var len = range * 2;
        for (var i = start; i < start + len && i < row.length; i++) {
            if (row[i] && Math.random() > 0.6) {
                row[i].style.opacity = '0';
            }
        }
        setTimeout(function() {
            for (var i = start; i < start + len && i < row.length; i++) {
                if (row[i]) row[i].style.opacity = '1';
            }
        }, ri(20, 60));
        setTimeout(eyeGlitch, ri(100, 1000));
    }
    eyeGlitch();

    function ascend() {
        anime.animate(pre, {
            translateY: ['0px', '-2px', '0px'],
            duration: 4000,
            ease: 'easeInOutSine',
            loop: false
        });
        setTimeout(ascend, 5000);
    }
    ascend();

    function skroll() {
        anime.animate(pre, {
            rotate: [0, ri(-1, 1) * 0.3, 0],
            duration: ri(2000, 5000),
            ease: 'easeInOutSine',
            loop: false
        });
        setTimeout(skroll, ri(2000, 5000));
    }
    skroll();

    function charSwarm() {
        var n = ri(5, 15);
        var swaps = [];
        for (var i = 0; i < n; i++) {
            var idx = ri(0, allChars.length - 1);
            var c = allChars[idx];
            if (!c) continue;
            var orig = c.textContent;
            c.textContent = pick(['@', '#', '%', '&', 'O', 'X']);
            swaps.push({ el: c, orig: orig });
        }
        setTimeout(function() {
            swaps.forEach(function(s) { s.el.textContent = s.orig; });
        }, ri(15, 50));
        setTimeout(charSwarm, ri(200, 800));
    }
    charSwarm();

    anime.animate('pre', {
        opacity: [1, 0.88, 1],
        duration: 80,
        loop: true,
        direction: 'alternate',
        ease: 'linear'
    });
})();
